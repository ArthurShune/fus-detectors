name: public-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  public-quick-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e .[dev]

      - name: Build wheel
        run: |
          python -m build --wheel --no-isolation

      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/fus-detectors-wheel-smoke
          source /tmp/fus-detectors-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install dist/*.whl
          python - <<'PY'
          import numpy as np
          from fus_detectors import DetectorConfig, score_residual_cube

          t = np.arange(12, dtype=np.float32)
          tone = np.exp(1j * 2.0 * np.pi * 350.0 * t / 2500.0).astype(np.complex64)
          cube = np.zeros((12, 8, 8), dtype=np.complex64)
          cube[:, 4, 4] = tone

          result = score_residual_cube(
              cube,
              prf_hz=2500.0,
              config=DetectorConfig(device="cpu"),
          )
          assert result.readout_map.shape == (8, 8)
          assert result.score_map.shape == (8, 8)
          print(result.summary.to_dict())
          PY

      - name: Run public quick gate
        run: |
          make refactor-quick-ci
