name: public-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  public-quick-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pytest ruff
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run public quick gate
        env:
          PYTHONPATH: .
        run: |
          make refactor-quick-ci
