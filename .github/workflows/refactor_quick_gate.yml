name: refactor-quick-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quick-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pytest ruff
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Lint phase tooling
        run: |
          ruff check \
            scripts/verify_refactor.py \
            scripts/refactor_inventory.py \
            scripts/phase_close_report.py \
            scripts/refactor/verify_gate.py \
            scripts/refactor/inventory.py \
            scripts/refactor/phase_close.py

      - name: Run quick refactor gate (CI-safe)
        env:
          PYTHONPATH: .
        run: |
          python scripts/verify_refactor.py \
            --mode quick \
            --execute \
            --python-runner local \
            --allow-missing-data-gates
